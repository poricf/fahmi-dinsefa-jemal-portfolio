<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fahmi Dinsefa Jemal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Manrope:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Manrope', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              signal: {
                DEFAULT: '#2dd4bf', // Teal 400
                dim: '#115e59',
              },
              void: {
                DEFAULT: '#09090b', // Zinc 950
                surface: '#18181b', // Zinc 900
                border: '#27272a', // Zinc 800
              }
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #09090b; /* Ensure base color matches bg-void */
      }
      
      body {
        font-family: 'Manrope', sans-serif;
        color: #e4e4e7;
        overflow-x: hidden;
      }
      
      /* Noise Texture */
      .bg-noise {
        position: fixed;
        inset: 0; /* Cover top, right, bottom, left */
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999; /* Force on top of everything including footer */
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Clean scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a; 
        border-radius: 0px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2dd4bf; 
      }
      
      .corner-bracket {
        position: absolute;
        width: 8px;
        height: 8px;
        border-color: #2dd4bf;
        border-style: solid;
        transition: all 0.3s ease;
        opacity: 0;
      }
      .group:hover .corner-bracket {
        opacity: 1;
      }
      
      /* Specific bracket positions */
      .tl { top: 0; left: 0; border-width: 1px 0 0 1px; }
      .tr { top: 0; right: 0; border-width: 1px 1px 0 0; }
      .bl { bottom: 0; left: 0; border-width: 0 0 1px 1px; }
      .br { bottom: 0; right: 0; border-width: 0 1px 1px 0; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
